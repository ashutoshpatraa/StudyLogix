# ===========================================================================
# StudyLogix — Render.com Deployment Configuration
# ===========================================================================
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: studylogix
    env: python
    pythonVersion: "3.12"
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true   # Render auto-generates a secure random value
      - key: PYTHON_VERSION
        value: "3.12"
    disk:
      name: studylogix-data
      mountPath: /opt/render/project/src
      sizeGB: 1
