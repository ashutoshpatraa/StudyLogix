{% extends "base.html" %}

{% block title %}Sign In - StudyLogix{% endblock %}

{% block content %}
<div style="display: flex; min-height: 80vh; align-items: center; justify-content: center; padding: var(--space-4);">
    <div class="card" style="width: 100%; max-width: 420px; padding: var(--space-6) var(--space-5); animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);">
        <div style="text-align: center; margin-bottom: var(--space-5);">
            <div style="width: 48px; height: 48px; border-radius: var(--radius-md); background: var(--accent-gradient); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto var(--space-3); box-shadow: var(--shadow-glow);">
                <i class="fas fa-layer-group"></i>
            </div>
            <h1 style="font-size: 1.75rem; letter-spacing: -0.03em; margin-bottom: var(--space-1);">Welcome back</h1>
            <p style="color: var(--text-secondary); font-size: 0.95rem;">Enter your credentials to access your account</p>
        </div>
        
        <form method="POST" action="{{ url_for('login') }}" id="loginForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div style="margin-bottom: var(--space-4);">
                <label for="username" class="form-label">Username</label>
                <div style="position: relative;">
                    <i class="fas fa-user" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary);"></i>
                    <input type="text" class="form-control" id="username" name="username" placeholder="johndoe" required autofocus style="padding-left: 40px;">
                </div>
            </div>
            
            <div class="form-group" style="margin-bottom: var(--space-5);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label for="password" class="form-label" style="margin-bottom: 0;">Password</label>
                    <!-- Future feature: <a href="#" style="font-size: 0.8rem; color: var(--accent-base);">Forgot password?</a> -->
                </div>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary);"></i>
                    <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required style="padding-left: 40px;">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-bottom: var(--space-4);">
                Sign In <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
            </button>
            
            <div style="text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
                Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--accent-base); font-weight: 500;">Create one</a>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function() {
    const btn = this.querySelector('button[type="submit"]');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
    btn.style.pointerEvents = 'none';
    btn.style.opacity = '0.8';
});
</script>
{% endblock %}
