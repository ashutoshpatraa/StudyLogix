{% extends "base.html" %}

{% block title %}SYSTEM ACCESS - STUDYLOGIX{% endblock %}

{% block content %}
<!-- Nothing OS Login Interface -->
<div class="hero-wrapper">
    <div class="glass-card ambient-card max-w-480 p-10">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="auth-header-icon" style="border-color: var(--nothing-cyan);">
                <i class="fas fa-terminal" style="font-size: 32px; color: var(--nothing-cyan);"></i>
            </div>
            <h2 class="font-display text-3xl mb-2">
                SYSTEM_ACCESS
            </h2>
            <p class="text-muted-nothing text-md m-0">
                PLEASE AUTHENTICATE TO CONTINUE
            </p>
        </div>
        
        <!-- Login Form -->
        <form method="POST" class="d-flex flex-column gap-6">
            <!-- Username Field -->
            <div class="form-group-nothing">
                <label for="username" class="d-flex align-center gap-3 text-muted-nothing font-display text-md mb-2">
                    <i class="fas fa-user" style="color: var(--nothing-cyan);"></i>
                    IDENTIFIER
                </label>
                <input type="text" class="form-control-nothing font-mono" id="username" name="username" required placeholder="ENTER_USERNAME" autocomplete="username">
            </div>
            
            <!-- Password Field -->
            <div class="form-group-nothing">
                <label for="password" class="d-flex align-center gap-3 text-muted-nothing font-display text-md mb-2">
                    <i class="fas fa-lock" style="color: var(--nothing-purple);"></i>
                    SECURITY_KEY
                </label>
                <input type="password" class="form-control-nothing font-mono" id="password" name="password" required placeholder="ENTER_PASSWORD" autocomplete="current-password">
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="btn-nothing btn-nothing-primary mt-2" style="justify-content: center;">
                <i class="fas fa-sign-in-alt"></i>
                INITIALIZE_SESSION
            </button>
        </form>
        
        <!-- Footer Links -->
        <div class="text-center mt-6 pt-6 border-top-glass">
            <p class="text-muted-nothing text-md m-0">
                NEW_USER? <a href="{{ url_for('register') }}" style="color: var(--nothing-cyan); text-decoration: none; font-family: 'DotGothic16', monospace;">CREATE_ACCOUNT</a>
            </p>
        </div>
    </div>
</div>

<!-- Terminal Boot Animation -->
<div class="terminal-lines" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; opacity: 0.1;">
    <div style="position: absolute; top: 20%; left: 10%; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--nothing-green); animation: terminal-glow 3s ease-in-out infinite;">
        > AUTHENTICATION_PROTOCOL_READY
    </div>
    <div style="position: absolute; top: 70%; right: 10%; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--nothing-cyan); animation: terminal-glow 3s ease-in-out infinite 1s;">
        > SECURE_CONNECTION_ESTABLISHED
    </div>
    <div style="position: absolute; bottom: 30%; left: 15%; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--nothing-purple); animation: terminal-glow 3s ease-in-out infinite 2s;">
        > AWAITING_USER_CREDENTIALS
    </div>
</div>
{% endblock %}
